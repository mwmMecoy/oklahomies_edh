<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random EDH Commander</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Random EDH Commander</h1>
    <nav>
      <a href="index.html" class="active">Random Commander</a>
      <a href="wheel.html">Restriction Wheel</a>
    </nav>
  </header>

  <main>
    <section class="filters">
      <div class="filter-row">
        <span class="filter-label">EDHREC Rank</span>
        <div class="filter-inputs">
          <div class="filter-pair">
            <label for="min-rank">Min</label>
            <input type="number" id="min-rank" placeholder="e.g. 200" min="1">
          </div>
          <div class="filter-pair">
            <label for="max-rank">Max</label>
            <input type="number" id="max-rank" placeholder="e.g. 1000" min="1">
          </div>
        </div>
      </div>

      <div class="filter-row">
        <span class="filter-label">Mana Value</span>
        <div class="filter-inputs">
          <div class="filter-pair">
            <label for="min-cmc">Min</label>
            <input type="number" id="min-cmc" placeholder="0" min="0">
          </div>
          <div class="filter-pair">
            <label for="max-cmc">Max</label>
            <input type="number" id="max-cmc" placeholder="any" min="0">
          </div>
        </div>
      </div>

      <div class="filter-row">
        <span class="filter-label">Colors</span>
        <div id="color-count-btns" class="btn-group">
          <button class="filter-btn count-btn active" data-count="">Any</button>
          <button class="filter-btn count-btn" data-count="1">1</button>
          <button class="filter-btn count-btn" data-count="2">2</button>
          <button class="filter-btn count-btn" data-count="3">3</button>
          <button class="filter-btn count-btn" data-count="4">4</button>
          <button class="filter-btn count-btn" data-count="5">5</button>
        </div>
      </div>

      <div class="filter-row">
        <span class="filter-label">Format</span>
        <div class="btn-group">
          <button class="filter-btn toggle-btn" id="pauper-toggle" data-active="false">Pauper EDH</button>
        </div>
      </div>

      <div class="filter-row hidden" id="color-combo-row">
        <span class="filter-label"></span>
        <div id="color-combo-btns" class="btn-group"></div>
      </div>

      <div class="filter-footer">
        <span id="pool-count">Loading commanders...</span>
        <span class="filter-hint">EDHREC rank 1 = most popular card among the full commander card pool</span>
      </div>
    </section>

    <button id="generate-btn" disabled>Roll Commander</button>

    <section id="card-display" class="hidden">
      <div class="card-container">
        <div class="card-image-wrapper">
          <img id="card-image" alt="Commander card">
        </div>
        <div class="card-info">
          <div class="card-header">
            <h2 id="card-name"></h2>
            <div id="card-mana-cost"></div>
          </div>
          <p id="card-type"></p>
          <div id="card-colors"></div>
          <div class="card-text">
            <p id="card-oracle"></p>
          </div>
          <div class="card-stats">
            <span id="card-pt"></span>
            <span id="card-edhrec-rank"></span>
          </div>
          <div class="card-links">
            <a id="card-scryfall-link" href="#" target="_blank" rel="noopener">View on Scryfall</a>
            <a id="card-edhrec-link" href="#" target="_blank" rel="noopener">View on EDHREC</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
